---
title: ClinicalTriageEnv
emoji: 🏥
colorFrom: red
colorTo: blue
sdk: docker
pinned: false
license: apache-2.0
tags:
  - openenv
  - clinical-triage
  - reinforcement-learning
  - medical-ai
  - resource-allocation
  - agent-environment

name: clinical-triage-env
version: 1.1.0
description: >
  OpenEnv environment simulating ICU resource allocation under uncertainty.
  Agents triage patients by severity and allocate scarce hospital resources.
  Compliant with the OpenEnv Gymnasium-like interface (obs, reward, done, info).

tasks:
  - id: task1
    name: Single-Resource Triage
    difficulty: easy
    description: >
      Triage 6 patients with severity hints shown. Adequate resources.
    max_steps: 6
    reward_range: [-0.30, 1.0]
    partial_observability: false

  - id: task2
    name: Multi-Resource Triage Under Pressure
    difficulty: medium
    description: >
      Triage 9 patients without severity hints. Moderate resource scarcity.
    max_steps: 9
    reward_range: [-0.30, 1.0]
    partial_observability: true

  - id: task3
    name: Mass Casualty Surge
    difficulty: hard
    description: >
      Triage 12 patients during surge. Ethical trade-offs mandatory. Rationale scored.
    max_steps: 12
    reward_range: [-0.30, 1.0]
    partial_observability: true

action_space:
  type: object
  fields:
    patient_id: string
    decision: enum[admit_icu, admit_ward, stabilize, discharge, palliative, defer]
    resource_allocation: dict[string, int]
    rationale: string | null
    priority_override: int[1,10] | null

observation_space:
  type: object
  fields:
    task_id: string
    step: integer
    max_steps: integer
    current_patient:
      patient_id: string
      age: integer
      chief_complaint: string
      vitals:
        heart_rate: integer
        systolic_bp: integer
        spo2: float
        respiratory_rate: integer
        gcs: integer[3,15]
        temperature: float
        lactate: float | null
      history: string
      time_since_arrival_minutes: integer
      deteriorating: boolean
      severity_hint: string | null
    resource_state:
      icu_beds_total: integer
      icu_beds_used: integer
      ventilators_total: integer
      ventilators_used: integer
      ward_beds_total: integer
      ward_beds_used: integer
      specialists_available: integer
    queue_length: integer
    episode_reward_so_far: float
    last_step_reward: float
    last_step_feedback: string
    done: boolean
    info:
      type: object
      description: "Contains the 'breakdown' dictionary with detailed reward components."

reward_design:
  type: dense
  dimensions:
    - name: survival_reward
      weight: 0.50
      description: "Primary score for matching patient need (max +0.50)."
    - name: resource_efficiency
      weight: 0.25
      description: "Bonus for correct allocation under high load; penalty for waste."
    - name: equity_penalty
      weight: -0.08
      description: "Penalizes excessive deferral patterns."
    - name: delay_penalty
      weight: -0.10
      description: "Penalizes deferring critical/deteriorating patients."
    - name: rationale_bonus
      weight: 0.10
      description: "Bonus for clinical terminology and logic in Task 3 rationale."

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks